    <h1 class="dash">Issued Book</h1>
    <div class="card">
        <form action="">
            <label for="Student Name">Student Name</label><input type="text" class="StudentName">
            <label for="Roll Number">Roll Number</label><input type="number" class="RollNumber">
            <label for="Book Name">Book Name</label><input type="text" class="BookName">

            <button class="issu">Issued Book</button>
        </form>
    </div>
    <!-- Success Popup -->
<div class="issue-popup" id="issuePopup">

    <div class="issue-icon">
      <i class="fa-solid fa-circle-check"></i>
    </div>

    <h2>Book Issued Successfully!</h2>
    <p>Book has been issued to the student.</p>
    <p id="issueUniqueId" style="font-weight: bold; color: #4CAF50;"></p>

    <button id="closeIssue">OK</button>
